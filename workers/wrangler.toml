# Cloudflare Workers — wrangler.toml
name = "rsp-api"
main = "entry.ts"
compatibility_date = "2026-06-02"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.image-editor.co/*", zone_name = "image-editor.co" }
]

# D1 binding
[[d1_databases]]
binding = "DB"
database_name = "rsp-db"
database_id = "93658231-c023-47d1-8839-1058283a724f"

# KV bindings
[[kv_namespaces]]
binding = "SESSIONS"
id = "48712c55221f467aa1d25bd6b2522fac"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "864c39c2ce244d11866532fc8784dca9"

# R2 bindings
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "image-editor-assets"

[[r2_buckets]]
binding = "OUTPUTS"
bucket_name = "image-editor-assets"

[vars]
AI_PROVIDER = "cf-workers-ai"